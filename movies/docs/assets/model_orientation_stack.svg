<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Model orientation stack</title>
  <desc id="desc">A diagram showing the layers from mesh axes to catalog correction, motion heading, and final camera readability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08121d"/>
      <stop offset="100%" stop-color="#13283d"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#183750"/>
      <stop offset="100%" stop-color="#295778"/>
    </linearGradient>
    <linearGradient id="goldCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f4719"/>
      <stop offset="100%" stop-color="#a06726"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#02070b" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4e5f6"/>
    </marker>
  </defs>

  <rect width="960" height="420" fill="url(#bg)"/>
  <circle cx="838" cy="74" r="44" fill="#f2b560" opacity="0.9"/>
  <circle cx="838" cy="74" r="62" fill="#f8ce92" opacity="0.12"/>
  <ellipse cx="176" cy="84" rx="58" ry="18" fill="#7aa4c6" opacity="0.25"/>

  <text x="52" y="46" font-family="DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#f5fbff">Spacecraft Orientation Stack</text>
  <text x="52" y="72" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#c9dced">Static mesh correction and dynamic flight heading are separate layers. That separation is what keeps shots reusable.</text>

  <rect x="60" y="118" rx="20" ry="20" width="188" height="196" fill="url(#blueCard)" filter="url(#shadow)"/>
  <text x="82" y="152" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">1. Mesh</text>
  <text x="82" y="184" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">Imported assets arrive</text>
  <text x="82" y="206" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">with different local</text>
  <text x="82" y="228" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">front and up axes.</text>
  <text x="82" y="266" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#9fd0ff">Question:</text>
  <text x="82" y="288" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">What does this OBJ</text>
  <text x="82" y="310" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">think "forward" means?</text>

  <rect x="284" y="118" rx="20" ry="20" width="198" height="196" fill="url(#goldCard)" filter="url(#shadow)"/>
  <text x="306" y="152" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">2. Catalog</text>
  <text x="306" y="184" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">Static correction in</text>
  <text x="306" y="206" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">`model_pitch`,</text>
  <text x="306" y="228" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">`model_yaw`, and</text>
  <text x="306" y="250" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">`visual_scale`.</text>
  <text x="306" y="288" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ffe2a6">Goal:</text>
  <text x="306" y="310" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">Make every ship obey</text>
  <text x="306" y="332" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">the same engine forward.</text>

  <rect x="518" y="118" rx="20" ry="20" width="190" height="196" fill="url(#blueCard)" filter="url(#shadow)"/>
  <text x="540" y="152" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">3. Motion</text>
  <text x="540" y="184" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">Dynamic yaw, pitch,</text>
  <text x="540" y="206" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">and roll come from</text>
  <text x="540" y="228" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">flight controls or</text>
  <text x="540" y="250" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">path deltas.</text>
  <text x="540" y="288" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#9fd0ff">Formula:</text>
  <text x="540" y="310" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">heading = normalize</text>
  <text x="540" y="332" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ddebf7">(next - current)</text>

  <rect x="744" y="118" rx="20" ry="20" width="166" height="196" fill="url(#goldCard)" filter="url(#shadow)"/>
  <text x="766" y="152" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">4. Camera</text>
  <text x="766" y="184" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">Follow distance,</text>
  <text x="766" y="206" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">height, and inspect</text>
  <text x="766" y="228" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">mode decide whether</text>
  <text x="766" y="250" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">the correction is</text>
  <text x="766" y="272" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">easy to read.</text>
  <text x="766" y="310" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#ffe2a6">Result:</text>
  <text x="766" y="332" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">A ship that looks like</text>
  <text x="766" y="354" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#fff0d8">it flies nose-first.</text>

  <path d="M 248 216 C 262 216, 268 216, 284 216" fill="none" stroke="#d4e5f6" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 482 216 C 496 216, 502 216, 518 216" fill="none" stroke="#f3d39a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 708 216 C 722 216, 728 216, 744 216" fill="none" stroke="#d4e5f6" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="52" y="382" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" fill="#b6cede">Renderer composition: R_ship(yaw, pitch, roll) * R_model(model_yaw, model_pitch) * Scale</text>
</svg>
